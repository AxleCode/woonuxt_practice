fragment ProductPricing on ProductWithPricing {
  price
  rawPrice: price(format: RAW)
  regularPrice
  rawRegularPrice: regularPrice(format: RAW)
  salePrice
  rawSalePrice: salePrice(format: RAW)
  ... on Product {
    onSale
  }
  ... on ExternalProduct {
    onSale
  }
  ... on GroupProduct {
    onSale
  }
  ... on ProductVariation {
    onSale
  }
}
fragment ProductStock on InventoriedProduct {
  stockStatus
  stockQuantity
  lowStockAmount
}
